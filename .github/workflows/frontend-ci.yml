name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      type-check: ${{ steps.type-check.outcome }}
      format: ${{ steps.format.outcome }}
      lint: ${{ steps.lint.outcome }}
      test: ${{ steps.test.outcome }}
      build: ${{ steps.build.outcome }}
      barrel: ${{ steps.barrel.outcome }}
      tokens: ${{ steps.tokens.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        id: type-check
        continue-on-error: true
        run: yarn type-check

      - name: Format check
        id: format
        continue-on-error: true
        run: yarn format:check

      - name: Lint check
        id: lint
        continue-on-error: true
        run: yarn lint

      - name: Run tests
        id: test
        continue-on-error: true
        run: yarn test --run

      - name: Build
        id: build
        continue-on-error: true
        run: yarn build

      - name: Barrel check
        id: barrel
        continue-on-error: true
        run: yarn gen:index:check

      - name: Design tokens check
        id: tokens
        continue-on-error: true
        run: yarn tokens:check

      - name: Check results
        if: always()
        run: |
          if [[ "${{ steps.type-check.outcome }}" == "failure" ]] || \
             [[ "${{ steps.format.outcome }}" == "failure" ]] || \
             [[ "${{ steps.lint.outcome }}" == "failure" ]] || \
             [[ "${{ steps.test.outcome }}" == "failure" ]] || \
             [[ "${{ steps.build.outcome }}" == "failure" ]] || \
             [[ "${{ steps.barrel.outcome }}" == "failure" ]] || \
             [[ "${{ steps.tokens.outcome }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi

  comment:
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Comment results on PR
        uses: actions/github-script@v9
        with:
          script: |
            const results = {
              typeCheck: '${{ needs.ci.outputs.type-check }}',
              format: '${{ needs.ci.outputs.format }}',
              lint: '${{ needs.ci.outputs.lint }}',
              test: '${{ needs.ci.outputs.test }}',
              build: '${{ needs.ci.outputs.build }}',
              barrel: '${{ needs.ci.outputs.barrel }}',
              tokens: '${{ needs.ci.outputs.tokens }}',
            };

            const line = (status, name, successLabel = '통과', failureLabel = '실패') => {
              if (status === 'success') return `✅ **${name}**: ${successLabel}\n`;
              if (status === 'skipped') return `⏭️ **${name}**: 건너뜀\n`;
              return `❌ **${name}**: ${failureLabel}\n`;
            };

            let comment = '## PR 검증 결과\n\n';
            comment += line(results.typeCheck, 'TypeScript');
            comment += line(results.format, 'Prettier', '통과', '포맷 필요');
            comment += line(results.lint, 'ESLint');
            comment += line(results.test, 'Test');
            comment += line(results.build, 'Build', '성공', '실패');
            comment += line(results.barrel, 'Barrel', '동기화', '비동기화');
            comment += line(results.tokens, 'Design Tokens', '동기화', '비동기화');

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } catch (error) {
              console.log('Failed to comment:', error.message);
            }
