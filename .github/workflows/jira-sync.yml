name: Jira Sync

on:
  issues:
    types: [opened, closed]

permissions:
  contents: read
  issues: write

jobs:
  create:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Create Jira issue
        id: jira
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          if [ -z "${{ secrets.JIRA_USER_EMAIL }}" ] || \
             [ -z "${{ secrets.JIRA_API_TOKEN }}" ] || \
             [ -z "${{ secrets.JIRA_BASE_URL }}" ] || \
             [ -z "${{ secrets.JIRA_PROJECT_KEY }}" ]; then
            echo "Missing one or more Jira secrets: JIRA_USER_EMAIL, JIRA_API_TOKEN, JIRA_BASE_URL, JIRA_PROJECT_KEY"
            exit 1
          fi

          BODY=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg project "${{ secrets.JIRA_PROJECT_KEY }}" \
            '{
              fields: {
                project: { key: $project },
                summary: $title,
                issuetype: { name: "Story" },
                description: {
                  type: "doc", version: 1,
                  content: [{ type: "paragraph", content: [{ type: "text", text: ("GitHub: " + $url) }] }]
                }
              }
            }')

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue" \
            -d "$BODY")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Jira issue creation failed with HTTP $HTTP_STATUS"
            echo "$RESPONSE_BODY" | jq .
            exit 1
          fi

          JIRA_KEY=$(echo "$RESPONSE_BODY" | jq -r '.key // empty')
          if [ -z "$JIRA_KEY" ]; then
            echo "Jira issue creation response did not include a key"
            echo "$RESPONSE_BODY" | jq .
            exit 1
          fi

          echo "jira_key=$JIRA_KEY" >> $GITHUB_OUTPUT

      - name: Comment Jira link
        if: steps.jira.outputs.jira_key != ''
        uses: actions/github-script@v7
        with:
          script: |
            const key = '${{ steps.jira.outputs.jira_key }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔗 Jira: [${key}](${{ secrets.JIRA_BASE_URL }}/browse/${key})`,
            });

  close:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Find Jira key from comments
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const match = comments.data
              .map((comment) => comment.body)
              .join('\n')
              .match(/[A-Z]+-\d+/);
            core.setOutput('jira_key', match ? match[0] : '');

      - name: Transition to Done
        if: steps.find.outputs.jira_key != ''
        run: |
          if [ -z "${{ secrets.JIRA_USER_EMAIL }}" ] || \
             [ -z "${{ secrets.JIRA_API_TOKEN }}" ] || \
             [ -z "${{ secrets.JIRA_BASE_URL }}" ]; then
            echo "Missing one or more Jira secrets: JIRA_USER_EMAIL, JIRA_API_TOKEN, JIRA_BASE_URL"
            exit 1
          fi

          JIRA_KEY="${{ steps.find.outputs.jira_key }}"
          TRANSITIONS=$(curl -sS \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${JIRA_KEY}/transitions")
          DONE_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.name | test("완료|Done|done")) | .id' | head -1)

          if [ -n "$DONE_ID" ]; then
            curl -sS -X POST \
              -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${JIRA_KEY}/transitions" \
              -d "{\"transition\": {\"id\": \"${DONE_ID}\"}}"
            echo "✓ $JIRA_KEY → Done"
          fi
