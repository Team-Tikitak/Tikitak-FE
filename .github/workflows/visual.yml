name: Visual Regression

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update:
        description: 'baseline 스냅샷 갱신 후 커밋'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  visual:
    name: Playwright VRT
    runs-on: ubuntu-latest
    # 고정 이미지로 렌더링 환경(폰트·브라우저)을 핀 → baseline drift 방지.
    # 태그는 @playwright/test 버전과 일치시킬 것.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 20
    env:
      VISUAL: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build production bundle
        run: yarn build

      - name: Run visual tests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.update) }}
        run: yarn e2e --project=mobile-chrome
        env:
          CI: 'true'

      - name: Update baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update }}
        run: yarn e2e --project=mobile-chrome --update-snapshots
        env:
          CI: 'true'

      - name: Commit updated baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'e2e/**/*-snapshots/**'
          if git diff --cached --quiet; then
            echo "baseline 변경 없음"
          else
            git commit -m "test: VRT baseline 갱신"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: playwright-report/
          retention-days: 7
