# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ko-KR'
early_access: false

tone_instructions: '파일명·함수명·타입명·변수명·코드·명령어·URL·에러 메시지만 원문 유지. 헤딩/과한 강조, 인사말·제품 소개·사용법·홍보 문구 금지. 인라인은 핵심·이유·개선 방향만 짧게. diff 관련 버그·보안·접근성·유지보수 우선, 중복·취향 지적 제외.'

reviews:
  profile: 'assertive'
  high_level_summary: true
  request_changes_workflow: false
  review_status: true
  poem: false
  assess_linked_issues: true
  auto_apply_labels: false
  suggested_reviewers: false
  collapse_walkthrough: true
  sequence_diagrams: false
  changed_files_summary: true
  abort_on_close: true

  path_filters:
    - '!.yarn/**'
    - '!.pnp.*'
    - '!yarn.lock'
    - '!**/*.png'
    - '!**/*.jpg'
    - '!**/*.jpeg'
    - '!**/*.gif'
    - '!**/*.webp'
    - '!**/*.svg'
    - '!**/*.ico'
    - '!coverage/**'
    - '!**/storybook-static/**'
    - '!**/*.snap'

  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: 'src/**'
      instructions: |
        FSD 경계를 검토한다. src/app은 부트스트랩/providers/routes/layout/전역 스타일,
        src/pages는 라우트 단위 기능(shared 의존 가능), src/shared는 pages에 의존하지 않는다.
        페이지 간 직접 import는 피하고, 공용 경계가 필요하면 shared로 승격한다.
        서버 데이터는 TanStack Query, 클라이언트 전역 상태는 Zustand, UI 로컬 상태는 useState를 우선한다.
        우선순위: 저장소 규칙 준수 > 정확성/회귀 가능성 > 접근성/모바일 흐름 > 타입 안정성 > 테스트 누락.
    - path: 'src/shared/api/**'
      instructions: |
        API 호출과 요청·응답 타입은 shared/api 경계를 통해 관리한다.
        데이터 계약(요청/응답 타입) 안정성과 회귀 가능성을 우선 검토한다.
    - path: '**/*.{ts,tsx}'
      instructions: |
        비즈니스 로직 Hook과 인터랙티브 컴포넌트 변경에는 회귀 테스트 필요성을 검토한다.
        테스트는 대상 코드 옆에 co-location 한다.
    - path: '{ios/**,**/capacitor.config.*}'
      instructions: |
        모바일 웹과 Capacitor 환경의 내비게이션, safe-area, native bridge 회귀를 함께 검토한다.
    - path: 'src/shared/ui/**'
      instructions: |
        공용 컴포넌트는 className·ref를 항상 노출하고, 스타일 변형은 tailwind-variants(tv)로 표현한다.
        div+onClick 대신 button/a 등 시맨틱 요소를 쓰고 a11y(label·키보드·ARIA)를 확인한다.
        한 페이지 전용 컴포넌트를 shared로 올리지 않는다(도메인 결합 기준).
        variant/status 같은 union은 as const 튜플+파생 타입, 값별 설정은 Record+satisfies로 누락을 막는다.
    - path: 'src/shared/api/**/queries.ts'
      instructions: |
        query key는 도메인별 keys 팩토리로 관리하고 응답에 영향 주는 params를 포함한다.
        mutation 후 invalidate/refetch/낙관적 업데이트(onMutate→onError 롤백→onSettled) 선택 기준이 명확한지 본다.
        사용자 대면 mutation 실패는 meta.errorMessage 패턴으로 안내한다.
        navigate 직전 목적지 loader가 의존하는 캐시는 동기 확정하는지 확인한다.
    - path: 'src/{app/lib/native,shared/lib/native}/**'
      instructions: |
        네이티브/웹 분기는 Capacitor.isNativePlatform()로 가드하고 웹 폴백을 둔다.
        safe-area·키보드는 CSS 변수(--safe-top/--keyboard-height) 체계를 따른다.
        권한은 prompt/denied를 구분하고 denied는 설정 안내로 처리한다.
        getUserMedia·Blob URL·타이머는 cleanup 쌍을 작성한다.

  tools:
    gitleaks:
      enabled: true

chat:
  auto_reply: true
