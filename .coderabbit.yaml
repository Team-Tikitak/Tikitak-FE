# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ko-KR'
early_access: false

tone_instructions: |
  파일명, 함수명, 타입명, 변수명, 코드 조각, 명령어, URL, 에러 메시지만 원문을 유지한다.
  리뷰 본문에 크게 보이는 markdown heading(#, ##, ###)이나 과도한 강조를 쓰지 않는다.
  인사말, 제품 소개, 사용법 안내, 홍보성 문구를 쓰지 않는다.
  인라인 코멘트는 핵심만 짧게 지적하고 왜 문제인지와 개선 방향을 함께 제시한다.
  사소한 스타일/취향 지적보다 버그 가능성, 보안, 접근성, 유지보수 영향을 우선한다.
  변경 diff와 직접 관련된 내용만 남기고 중복 지적은 피한다.

reviews:
  profile: 'assertive'
  high_level_summary: true
  request_changes_workflow: false
  review_status: true
  poem: false
  assess_linked_issues: true
  auto_apply_labels: false
  suggested_reviewers: false
  collapse_walkthrough: false
  changed_files_summary: true
  abort_on_close: true

  path_filters:
    - '!.yarn/**'
    - '!.pnp.*'
    - '!yarn.lock'
    - '!**/*.png'
    - '!**/*.jpg'
    - '!**/*.jpeg'
    - '!**/*.gif'
    - '!**/*.webp'
    - '!**/*.svg'
    - '!**/*.ico'
    - '!coverage/**'
    - '!**/storybook-static/**'
    - '!**/*.snap'

  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: 'src/**'
      instructions: |
        FSD 경계를 검토한다. src/app은 부트스트랩/providers/routes/layout/전역 스타일,
        src/pages는 라우트 단위 기능(shared 의존 가능), src/shared는 pages에 의존하지 않는다.
        페이지 간 직접 import는 피하고, 공용 경계가 필요하면 shared로 승격한다.
        서버 데이터는 TanStack Query, 클라이언트 전역 상태는 Zustand, UI 로컬 상태는 useState를 우선한다.
        우선순위: 저장소 규칙 준수 > 정확성/회귀 가능성 > 접근성/모바일 흐름 > 타입 안정성 > 테스트 누락.
    - path: 'src/shared/api/**'
      instructions: |
        API 호출과 요청·응답 타입은 shared/api 경계를 통해 관리한다.
        데이터 계약(요청/응답 타입) 안정성과 회귀 가능성을 우선 검토한다.
    - path: '**/*.{ts,tsx}'
      instructions: |
        비즈니스 로직 Hook과 인터랙티브 컴포넌트 변경에는 회귀 테스트 필요성을 검토한다.
        테스트는 대상 코드 옆에 co-location 한다.
    - path: '{ios/**,**/capacitor.config.*}'
      instructions: |
        모바일 웹과 Capacitor 환경의 내비게이션, safe-area, native bridge 회귀를 함께 검토한다.

chat:
  auto_reply: true

tools:
  gitleaks:
    enabled: true
